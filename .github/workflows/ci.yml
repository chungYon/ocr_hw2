name: CI/CD Pipeline Build and Push to Docker Hub

# 1. 트리거 조건: main 브랜치로 push 될 때 작동
on:
  push:
    branches:
      - main

env:
  # 사용할 Docker Hub 리포지토리 이름 (본인 ID에 맞게 수정 필요)
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/ocr-api-server

jobs:
  # ------ 빌드 및 푸시 작업 (Github 기본 제공 서버 사용) ------
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 2. Github 리포지토리의 소스 코드를 Checkout
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 3. Docker 레이어 캐싱을 지원하는 Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Docker 이미지 빌드 및 Push
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max

  # ------ 배포 작업 (사용자 본인 컴퓨터 : self-hosted runner 사용) ------
  deploy:
    # 앞선 빌드/푸시 작업이 성공적으로 끝난 뒤에만 실행되도록 종속성 설정
    needs: build-and-push
    runs-on: self-hosted

    steps:
      # 자체 구축한 서버이기 때문에 기존 작업 디렉터리가 남아있지 않도록 보안상, 환경 초기화상 좋음
      - name: Docker Hub 로그인 (Private 이미지일 경우 대비)
        # Windows 환경의 Self-hosted Runner에서도 잘 작동하도록 수정
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: 최신 Docker 이미지 Pull
        run: docker pull ${{ env.DOCKER_IMAGE }}:latest

      - name: 기존에 돌고 있는 컨테이너 중지 및 삭제
        # 에러 발생 시(기존 컨테이너가 없는 처음 실행일 때) 무시하고 지나가도록 '|| true' 대신 플랫폼 독립적 구문 선호
        # Powershell/Cmd 환경에서는 || true 동작이 다를 수 있어 스크립트를 변경합니다.
        run: |
          docker stop ocr-api-server 2>nul || (exit 0)
          docker rm ocr-api-server 2>nul || (exit 0)
        shell: cmd

      - name: 새 이미지로 컨테이너 실행
        # -d: 백그라운드 구동, -p: 포트 매핑, --restart: 재부팅시 자동 실행 대비
        run: docker run -d --name ocr-api-server -p 8000:8000 --restart unless-stopped ${{ env.DOCKER_IMAGE }}:latest

      - name: (옵션) 자리만 차지하는 쌓인 옛날 이미지들(dangling) 삭제
        run: docker image prune -f
